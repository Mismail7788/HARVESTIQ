<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HarvestIQ — Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">

  <!-- Left Panel -->
  <div class="left-panel">
    <div class="brand">
      <span class="brand-icon">🌾</span>
      <h1>Harvest<span>IQ</span></h1>
      <p>Smart Farming Advisory and Marketplace for Modern Agriculture.</p>
      <div class="features">
        <div class="feature-item"><div class="feature-dot"></div>AI Crop Disease Detection</div>
        <div class="feature-item"><div class="feature-dot"></div>Smart Multi-Vendor Marketplace</div>
        <div class="feature-item"><div class="feature-dot"></div>Real-time Order Tracking</div>
        <div class="feature-item"><div class="feature-dot"></div>Agricultural Advisory System</div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel">
    <div class="form-container">
      <div class="form-header">
        <h2>Welcome</h2>
        <p>Sign in to your account</p>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
      </div>

      <button class="btn-primary" onclick="login()">Sign In →</button>

      <div id="message" class="message"></div>

      <div class="divider"><span>or</span></div>

      <div class="bottom-link">
        New to HarvestIQ? <a href="signup.html">Create an account</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
